<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFR Hospitality — Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        select {
            padding: 12px 20px;
            border-radius: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .stars {
            color: #fbbf24;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .price-tag span {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .availability {
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rooms-count {
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-weight: 600;
        }

        .book-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .book-btn:hover {
            background: var(--accent-hover);
        }

        .book-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            color: #94a3b8;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--panel);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal h3 { margin-top: 0; font-size: 1.5rem; }
        .modal p { color: var(--text-muted); line-height: 1.6; }

        .modal-btns {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .confirm-btn { background: var(--accent); color: var(--bg); }
        .cancel-btn { background: rgba(255,255,255,0.1); color: white; }

        .loading {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 40px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .live-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #34d399;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .rating-score {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .no-price {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 10px;
        }

        .almosafer-btn {
            display: block;
            width: 100%;
            padding: 11px;
            border: 1px solid var(--accent);
            border-radius: 12px;
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
            transition: background 0.2s, color 0.2s;
            box-sizing: border-box;
        }

        .almosafer-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .catalogue-count {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hospitality Comparison</h1>
            <p style="color: var(--text-muted); margin-top: 10px;">Compare live prices and availability across Saudi cities.</p>
        </header>

        <div class="controls">
            <select id="city-select">
                <option value="riyadh">Riyadh</option>
                <option value="jeddah">Jeddah</option>
                <option value="dammam">Dammam</option>
                <option value="makkah">Makkah</option>
                <option value="madinah">Madinah</option>
                <option value="abha">Abha</option>
                <option value="al-ula">AlUla</option>
            </select>
        </div>

        <div id="catalogue-info" class="catalogue-count"></div>

        <div id="hotel-grid" class="comparison-grid">
            <!-- Cards loaded via JS -->
        </div>

        <div id="loading" class="loading hidden">Fetching live prices from Almosafer...</div>
    </div>

    <div id="booking-modal" class="modal-overlay">
        <div class="modal">
            <h3>Book your stay?</h3>
            <p id="modal-text">Would you like to reserve a room at this hotel?</p>
            <div class="modal-btns">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="confirm-btn" id="confirm-booking">Confirm Booking</button>
            </div>
        </div>
    </div>

    <script>
        let selectedHotel = null;

        async function loadHotels() {
            const city = document.getElementById('city-select').value;
            const grid = document.getElementById('hotel-grid');
            const loader = document.getElementById('loading');
            const info = document.getElementById('catalogue-info');

            grid.innerHTML = '';
            info.textContent = '';
            loader.classList.remove('hidden');

            try {
                const res = await fetch(`/api/hospitality?city=${encodeURIComponent(city)}&type=hotel`);
                const data = await res.json();

                if (!data.length) {
                    grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;">No hotels found on Almosafer for this city right now. Try again later.</p>';
                    return;
                }

                // Show how many hotels are in the growing catalogue
                const catRes = await fetch(`/api/hotels?city=${encodeURIComponent(city)}`);
                const catData = await catRes.json();
                const catCount = catData.city_catalogue_size || 0;
                if (catCount > 0) {
                    info.textContent = `${catCount} hotels discovered in ${city.charAt(0).toUpperCase()+city.slice(1)} so far — showing 5 live prices`;
                }

                grid.innerHTML = data.map(h => {
                    const stars = '★'.repeat(Math.min(h.stars || 4, 5));
                    const price = h.live_price_sar;
                    const priceHtml = price
                        ? `<div class="price-tag">${Math.round(price).toLocaleString()} <span>SAR / night</span></div>`
                        : `<div class="no-price">Price unavailable — check Almosafer</div>`;
                    const ratingHtml = h.rating > 0
                        ? `<div class="rating-row"><span class="rating-score">★ ${h.rating.toFixed(1)}</span> Guest rating</div>`
                        : '';
                    const almosaferUrl = h.almosafer_url || '#';
                    const safeName = (h.name || '').replace(/'/g, "\\'");

                    return `
                    <div class="card">
                        <div class="live-badge">LIVE · Almosafer</div>
                        <h2>${h.name}</h2>
                        <div class="stars">${stars}</div>
                        ${ratingHtml}
                        ${priceHtml}
                        <button class="book-btn" onclick="askBooking('${h.id}', '${safeName}', ${price || 0}, '${almosaferUrl}')">
                            Choose this Hotel
                        </button>
                        <a class="almosafer-btn" href="${almosaferUrl}" target="_blank" rel="noopener">
                            View on Almosafer ↗
                        </a>
                    </div>`;
                }).join('');

            } catch (e) {
                grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;grid-column:1/-1;">Failed to load hotel data.</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        function askBooking(id, name, pricePerNight, almosaferUrl) {
            selectedHotel = { id, name, pricePerNight, almosaferUrl };
            const priceStr = pricePerNight > 0 ? ` at SAR ${Math.round(pricePerNight).toLocaleString()}/night` : '';
            document.getElementById('modal-text').innerText = `Reserve a room at ${name}${priceStr}? You'll be taken to Almosafer to complete your booking.`;
            document.getElementById('booking-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.remove('active');
            selectedHotel = null;
        }

        document.getElementById('confirm-booking').onclick = () => {
            if (!selectedHotel) return;
            closeModal();
            // Open Almosafer to complete booking — price is always live there
            window.open(selectedHotel.almosaferUrl || 'https://www.almosafer.com/en', '_blank', 'noopener');
        };

        document.getElementById('city-select').onchange = loadHotels;
        
        // Initial load
        loadHotels();
    </script>
</body>
</html>
